# ─────────────────────────────────────────────────────────────────
# NPZ Thermal Dataset – Configurations
# ─────────────────────────────────────────────────────────────────
#
# Expected directory structure:
#   IRData/
#   ├── 005/
#   │   ├── synchronized_data_0.npz
#   │   ├── synchronized_data_1.npz
#   │   └── ...
#   ├── 006/
#   │   └── ...
#   └── 027/
#       └── ...
#
# Contents of each .npz file:
#   array1: (N, 768, 1024) float32  – Thermal frames in °C
#   array2: (N,) float64            – Timestamps
#   array4: (N,) float64            – Raw pulse signal
#   array5: (N,) float64            – Raw respiration signal
#
# ─────────────────────────────────────────────────────────────────

# Path to .npz directory
root_dir: "/Volumes/home/IRData"

# Subject and recording filters
# null = load all available
# List = load only specified entries
subjects: ["018"]        # e.g. ["005", "006"] or null
recordings: null      # e.g. [0, 1, 5] or null

# Video parameters
fps: 30 # Fallback-FPS [frames per second]

# Preprocessing (Thermal camera requires a warm-up period)
warmup_seconds: 30
