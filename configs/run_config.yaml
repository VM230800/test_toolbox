# ─────────────────────────────────────────────────────────────────
# Main pipeline configurations
# ─────────────────────────────────────────────────────────────────

# Process multiple datasets sequentially
datasets:
  - name: "bp4d"
    config: "configs/bp4d.yaml"
  - name: "npz"
    config: "configs/npz.yaml"

# Processing mode
processing:
  streaming: true
  max_frames: null
  frame_step: 2                        # Process every second frame only
  dtype: float16 

# Used face detection (YOLO)
detection:
  model_path: "models/YOLOv11_TFL_252.pt"
  target_size: [400, 400]
  padding: 50

# Used methods
methods:
  thermal_mean:
    enabled: true
    target: "both"
    rois:
      - "forehead"
      - "left_cheek"
      - "right_cheek"

  ica:
    enabled: true
    target: "both"
    n_components: null
    rois:
      - "forehead"
      - "left_cheek"
      - "right_cheek"
      - "nose"
      - "philtrum"

  garbey:
    enabled: true
    target: "both"
    line_points: 10
    line_width: 3
    lines:
      hr:
        p1: 17
        p2: 1
      rr:
        p1: 30
        p2: 49

# Signal processing
signal:
  hr_bandpass:
    low: 0.7                            # [Hz] → ~42 BPM
    high: 4.0                           # [Hz] → ~240 BPM
    order: 4

  rr_bandpass:
    low: 0.1                            # [Hz] → ~6 BPM
    high: 0.5                           # [Hz] → ~30 BPM
    order: 4

  fft_window: 512
  peak_method: "fft"

# Evaluation
evaluation:
  metrics:
    - "MAE"
    - "RMSE"
    - "pearson"

# Output
output:
  save_dir: "results/"
  save_plots: true
  save_csv: true
  verbose: true
