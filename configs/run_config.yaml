# ─────────────────────────────────────────────────────────────────
# run_config.yaml – Hauptkonfiguration der Pipeline
# ─────────────────────────────────────────────────────────────────

# ── Datensatz ──
dataset: "bp4d"                         # "bp4d" oder "npz"
dataset_config: "configs/bp4d.yaml"

# ── Gesichtserkennung (YOLO) ──
detection:
  model_path: "models/YOLOv11_TFL_252.pt"
  num_keypoints: 54
  target_size: [400, 400]
  padding: 50
  confidence: 0.5
  device: "cpu"

# ── Methoden ──
methods:

  thermal_mean:
    enabled: true
    target: "hr"
    rois:
      - "forehead"
      - "left_cheek"
      - "right_cheek"

  ica:
    enabled: true
    target: "both"
    n_components: null
    rois:
      - "forehead"
      - "left_cheek"
      - "right_cheek"
      - "nose"
      - "philtrum"

  garbey:
    enabled: true
    target: "both"
    line_points: 10
    line_width: 3
    lines:
      hr:
        p1: 0
        p2: 2
      rr:
        p1: 48
        p2: 53

# ── Signalverarbeitung ──
signal:
  hr_bandpass:
    low: 0.7                            # [Hz] → ~42 BPM
    high: 4.0                           # [Hz] → ~240 BPM
    order: 4

  rr_bandpass:
    low: 0.1                            # [Hz] → ~6 BPM
    high: 0.5                           # [Hz] → ~30 BPM
    order: 4

  fft_window: 512
  peak_method: "fft"

# ── Auswertung ──
evaluation:
  metrics:
    - "MAE"
    - "RMSE"
    - "pearson"

# ── Ausgabe ──
output:
  save_dir: "results/"
  save_plots: true
  save_csv: true
  verbose: true
